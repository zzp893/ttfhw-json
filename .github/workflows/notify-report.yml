name: Notify Report Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'reports/**.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ttfhw-report rebuild
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.TTFHW_REPORT_TOKEN }}" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            https://api.github.com/repos/computing-TTFHW/report/dispatches \
            -d '{"event_type":"new-reports"}' \
            -w "\nHTTP %{http_code}" | tail -1
